# This workflow publishes the Python bindings for cedar-policy-mcp-schema-generator
# to PyPI. It must be triggered from main and pointed at a pre-created release tag.
name: Publish MCP schema generator Python to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        description: >
          GitHub tag to release. Must be of the form
          'cedar-policy-mcp-schema-generator-python-v<MAJOR>.<MINOR>.<PATCH>'.

permissions: read-all

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch
        if: github.ref != 'refs/heads/main'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: core.setFailed('This workflow must be triggered from the "main" branch.')

      - name: Validate tag format
        shell: bash
        run: |
          REGEX_PATTERN='^cedar-policy-mcp-schema-generator-python-v[0-9]+\.[0-9]+\.[0-9]+$'
          if [[ ! "$TAG_NAME" =~ $REGEX_PATTERN ]]; then
            echo "Specified tag must match $REGEX_PATTERN"
            exit 1
          fi
        env:
          TAG_NAME: ${{ inputs.tag }}

      - name: Checkout tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Validate package version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' rust/cedar-policy-mcp-schema-generator-python/pyproject.toml | head -1)
          EXPECTED="cedar-policy-mcp-schema-generator-python-v${VERSION}"
          if [[ "$EXPECTED" != "$TAG_NAME" ]]; then
            echo "Tag $TAG_NAME does not match pyproject.toml version $VERSION"
            echo "Expected $EXPECTED"
            exit 1
          fi
        env:
          TAG_NAME: ${{ inputs.tag }}

  build-wheels:
    needs: [validate]
    name: Build wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - name: Checkout tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.9"

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
          working-directory: rust/cedar-policy-mcp-schema-generator-python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: rust/cedar-policy-mcp-schema-generator-python/dist/

  build-sdist:
    needs: [validate]
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist
          working-directory: rust/cedar-policy-mcp-schema-generator-python

      - name: Upload sdist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: rust/cedar-policy-mcp-schema-generator-python/dist/

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: dist/
